<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>

<body>
    <div class="container">
        <div class="calcbody">
            <div class="screen">
                <div class="output">5318008</div>
            </div>
            <div class="buttonrow">
                <button class="btn fnc clear">Clear</button>
                <button class="btn fnc backspace">⌫</button>
                <button class="btn fnc divide">÷</button>
            </div>
            <div class="buttonrow">
                <button class="btn num">7</button>
                <button class="btn num">8</button>
                <button class="btn num">9</button>
                <button class="btn fnc multiplybtn">x</button>
            </div>
            <div class="buttonrow">
                <button class="btn num">4</button>
                <button class="btn num">5</button>
                <button class="btn num">6</button>
                <button class="btn fnc subtractbtn">-</button>
            </div>
            <div class="buttonrow">
                <button class="btn num">1</button>
                <button class="btn num">2</button>
                <button class="btn num">3</button>
                <button class="btn fnc addbtn">+</button>
            </div>
            <div class="buttonrow">
                <button class="btn num">0</button>
                <button class="btn numpoint">.</button>
                <button class="btn fnc equalsbtn">=</button>
            </div>
        </div>
    </div>
    
<script src="scripts.js"></script>
</body>
</html>
