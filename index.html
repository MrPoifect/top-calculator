<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calcbody">
            <div class="screen">
                <p class="sum">6 + 9 =</p>
                <p class="output">5318008</p>
            </div>
            <div class="buttonrow">
                <button class="btn fnc clear">Clear</button>
                <button class="btn fnc backspace">⌫</button>
                <button class="btn fnc divide">÷</button>
            </div>
            <div class="buttonrow">
                <button class="btn num7">7</button>
                <button class="btn num8">8</button>
                <button class="btn num8">9</button>
                <button class="btn fnc multiplybtn">X</button>
            </div>
            <div class="buttonrow">
                <button class="btn num4">4</button>
                <button class="btn num5">5</button>
                <button class="btn num6">6</button>
                <button class="btn fnc subtractbtn">-</button>
            </div>
            <div class="buttonrow">
                <button class="btn num1">1</button>
                <button class="btn num2">2</button>
                <button class="btn num3">3</button>
                <button class="btn fnc addbtn">+</button>
            </div>
            <div class="buttonrow">
                <button class="btn num0">0</button>
                <button class="btn numpoint">.</button>
                <button class="btn fnc equalsbtn">=</button>
            </div>
        </div>
    </div>
    
</body>
</html>
